name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "username=${{ secrets.DOCKER_HUB_USERNAME }}" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "username=" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Prepare all tags
        id: all_tags
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/wipter:latest"
          TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/wipter:${{ steps.date.outputs.date }}"
          if [ "${{ steps.dockerhub.outputs.enabled }}" == "true" ]; then
            TAGS="$TAGS"$'\n'"${{ steps.dockerhub.outputs.username }}/wipter:latest"
            TAGS="$TAGS"$'\n'"${{ steps.dockerhub.outputs.username }}/wipter:${{ steps.date.outputs.date }}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.all_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image info
        run: |
          echo "✅ Daily build pushed successfully!"
          echo ""
          echo "📦 GitHub Packages:"
          echo "  - ghcr.io/${{ github.repository_owner }}/wipter:latest"
          echo "  - ghcr.io/${{ github.repository_owner }}/wipter:${{ steps.date.outputs.date }}"
          echo ""
          if [ "${{ steps.dockerhub.outputs.enabled }}" == "true" ]; then
            echo "📦 Docker Hub:"
            echo "  - ${{ steps.dockerhub.outputs.username }}/wipter:latest"
            echo "  - ${{ steps.dockerhub.outputs.username }}/wipter:${{ steps.date.outputs.date }}"
          else
            echo "⚠️  Docker Hub not configured"
          fi
