name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.version_check.outputs.update_needed }}
      latest: ${{ steps.version_check.outputs.latest }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch Latest Wipter Version
        id: version_check
        run: |
          # Use ETag from the download URL as the version indicator
          etag=$(curl -sI https://provider-assets.wipter.com/latest/linux/x64/wipter-app-x64.tar.gz \
            | grep -i 'etag:' | tr -d '"' | awk '{print $2}' | tr -d '[:space:]')

          # Fallback: use Content-Length + Last-Modified if ETag is empty
          if [ -z "$etag" ]; then
            content_length=$(curl -sI https://provider-assets.wipter.com/latest/linux/x64/wipter-app-x64.tar.gz \
              | grep -i 'content-length:' | awk '{print $2}' | tr -d '[:space:]')
            last_modified=$(curl -sI https://provider-assets.wipter.com/latest/linux/x64/wipter-app-x64.tar.gz \
              | grep -i 'last-modified:' | cut -d' ' -f2- | tr -d '[:space:]')
            etag="${content_length}-${last_modified}"
          fi

          latest="$etag"
          echo "latest=$latest" >> $GITHUB_OUTPUT

          if [[ -f version.txt ]]; then
            stored=$(<version.txt)
          else
            stored=""
          fi
          echo "stored=$stored" >> $GITHUB_OUTPUT

          if [[ "$latest" != "$stored" ]] || [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "🆕 Update detected or forced build. Proceeding with build."
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "✅ No update needed. Skipping build."
          fi

      - name: Update version.txt
        if: steps.version_check.outputs.update_needed == 'true'
        run: echo "${{ steps.version_check.outputs.latest }}" > version.txt

      - name: Update README.md version heading
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          DATE=$(date +'%Y.%-m.%-d')
          sed -i \
            "s|^# Wipter Releases v.*|# Wipter Releases v$DATE|" \
            README.md || true

      - name: Commit version.txt back to main
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"
          git add version.txt README.md
          git diff --staged --quiet || git commit -m "chore: update version.txt [skip ci]"
          git push origin main || true

      - name: Set up QEMU
        if: steps.version_check.outputs.update_needed == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        if: steps.version_check.outputs.update_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version_check.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        if: steps.version_check.outputs.update_needed == 'true'
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "username=${{ secrets.DOCKER_HUB_USERNAME }}" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "username=" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: steps.version_check.outputs.update_needed == 'true' && steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get short SHA
        if: steps.version_check.outputs.update_needed == 'true'
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get current date
        if: steps.version_check.outputs.update_needed == 'true'
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Prepare all tags
        if: steps.version_check.outputs.update_needed == 'true'
        id: all_tags
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/wipter:latest"
          TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/wipter:${{ steps.sha.outputs.sha }}"
          TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/wipter:${{ steps.date.outputs.date }}"
          if [ "${{ steps.dockerhub.outputs.enabled }}" == "true" ]; then
            TAGS="$TAGS"$'\n'"${{ steps.dockerhub.outputs.username }}/wipter:latest"
            TAGS="$TAGS"$'\n'"${{ steps.dockerhub.outputs.username }}/wipter:${{ steps.sha.outputs.sha }}"
            TAGS="$TAGS"$'\n'"${{ steps.dockerhub.outputs.username }}/wipter:${{ steps.date.outputs.date }}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: steps.version_check.outputs.update_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.all_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image info
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          echo "✅ Image built and pushed successfully!"
          echo ""
          echo "📦 GitHub Packages:"
          echo "  - ghcr.io/${{ github.repository_owner }}/wipter:latest"
          echo "  - ghcr.io/${{ github.repository_owner }}/wipter:${{ steps.sha.outputs.sha }}"
          echo "  - ghcr.io/${{ github.repository_owner }}/wipter:${{ steps.date.outputs.date }}"
          echo "  🔗 View at: https://github.com/${{ github.repository }}/pkgs/container/wipter"
          echo ""
          if [ "${{ steps.dockerhub.outputs.enabled }}" == "true" ]; then
            echo "📦 Docker Hub:"
            echo "  - ${{ steps.dockerhub.outputs.username }}/wipter:latest"
            echo "  - ${{ steps.dockerhub.outputs.username }}/wipter:${{ steps.sha.outputs.sha }}"
            echo "  - ${{ steps.dockerhub.outputs.username }}/wipter:${{ steps.date.outputs.date }}"
            echo "  🔗 View at: https://hub.docker.com/r/${{ steps.dockerhub.outputs.username }}/wipter"
          else
            echo "⚠️  Docker Hub not configured"
          fi
